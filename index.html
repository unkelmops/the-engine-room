<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #f9fafb;
            color: #111827;
            line-height: 1.6;
            margin: 0;
        }
        .btn-primary {
            background-color: #2563eb;
            color: white;
            transition: all 0.2s ease;
            min-height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.5rem;
        }
        .btn-primary:hover {
            background-color: #1d4ed8;
            transform: translateY(-1px);
        }
        .premium-card {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e0f2fe;
            border: 1px solid rgba(96, 165, 250, 0.3);
            border-radius: 1rem;
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.25);
            transition: all 0.4s ease;
        }
        .premium-card:hover {
            box-shadow: 0 0 60px rgba(59, 130, 246, 0.45);
            transform: translateY(-6px);
        }
        .glow-text {
            text-shadow: 0 0 15px rgba(147, 197, 253, 0.6);
        }
        .scroll-container {
            display: flex;
            overflow-x: auto;
            gap: 1rem;
            padding-bottom: 1rem;
        }
        .product-card {
            flex: 0 0 280px;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 0.75rem;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .product-img {
            width: 100%;
            height: 240px;
            object-fit: cover;
        }
        .header-bg {
            background: url('https://i.imgur.com/MpOTaol.png') no-repeat center center;
            background-size: cover;
            min-height: 60vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
        }
        .header-content {
            position: relative;
            z-index: 1;
            color: white;
            text-align: center;
        }
    </style>
</head>

<body>

<header class="header-bg">
    <div class="header-overlay"></div>
    <div class="header-content">
        <h1 class="text-4xl font-bold">THE HQ</h1>
        <p>Premium Store</p>
    </div>
</header>

<!-- Fitted Caps -->
<section class="py-12 px-6 max-w-6xl mx-auto">
    <h2 class="text-3xl font-bold text-center mb-8">Fitted Caps Collection</h2>

    <div class="scroll-container">

        <div class="product-card">
            <img src="https://i.imgur.com/nMCoKc5.png" class="product-img">
            <div class="p-4 text-center">
                <h3 class="font-semibold">NY Edition</h3>
                <p class="text-lg font-bold text-blue-600 mt-2">R450</p>
            </div>
        </div>

        <div class="product-card">
            <img src="https://i.imgur.com/EjcAnGO.png" class="product-img">
            <div class="p-4 text-center">
                <h3 class="font-semibold">Aesthetic Edition</h3>
                <p class="text-lg font-bold text-blue-600 mt-2">R450</p>
            </div>
        </div>

        <div class="product-card">
            <img src="https://i.imgur.com/80nXFJ9.png" class="product-img">
            <div class="p-4 text-center">
                <h3 class="font-semibold">Soldier Edition</h3>
                <p class="text-lg font-bold text-blue-600 mt-2">R450</p>
            </div>
        </div>

        <div class="product-card">
            <img src="https://i.imgur.com/j1nl3Iy.png" class="product-img">
            <div class="p-4 text-center">
                <h3 class="font-semibold">Classic</h3>
                <p class="text-lg font-bold text-blue-600 mt-2">R450</p>
            </div>
        </div>

    </div>
</section>

</body>
</html>
