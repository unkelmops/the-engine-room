<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Skull Caps - THE HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f9fafb; color: #1f2937; }
        .form-input { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 0.375rem; margin-bottom: 1.25rem; font-size: 1rem; }
        .btn-submit { background-color: #2563eb; color: white; min-height: 56px; }
        .btn-submit:hover { background-color: #1d4ed8; }
    </style>
</head>
<body class="min-h-screen py-12 px-5">
    <div class="max-w-lg mx-auto bg-white p-8 rounded-xl shadow-lg">
        <h1 class="text-3xl font-bold text-center mb-8">Order Your Skull Cap</h1>
        
        <form action="https://formspree.io/f/meerpeok" method="POST">
            <!-- Your Formspree endpoint is already here -->

            <label class="block mb-2 font-medium text-gray-700">Full Name</label>
            <input type="text" name="name" required class="form-input">

            <label class="block mb-2 font-medium text-gray-700">WhatsApp Number</label>
            <input type="tel" name="phone" required class="form-input">

            <label class="block mb-2 font-medium text-gray-700">Email (optional)</label>
            <input type="email" name="email" class="form-input">

            <label class="block mb-2 font-medium text-gray-700">Model & Color</label>
            <select name="model" required class="form-input">
                <option value="">Select model</option>
                <option value="Cross Model">Cross Model (Black embroidery on white / White / Gray)</option>
                <option value="Purpill Model">Purpill Model</option>
                <option value="Aesthetic Model">Aesthetic Model (Black / Dark Gray / Light Gray / Navy Blue / Yellow)</option>
                <option value="X Model">X Model (Black / Gray)</option>
            </select>

            <label class="block mb-2 font-medium text-gray-700">Quantity</label>
            <input type="number" name="quantity" min="1" value="1" required class="form-input">

            <label class="block mb-2 font-medium text-gray-700">Delivery Address</label>
            <textarea name="address" rows="4" required class="form-input"></textarea>

            <button type="submit" class="btn-submit w-full py-4 text-lg font-semibold mt-6 rounded-lg">
                Submit Order
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            Delivery takes approximately 6 days. We'll contact you via WhatsApp/email to confirm.
        </p>
        <p class="text-center mt-4">
            <a href="index.html" class="text-blue-600 hover:underline">← Back to Shop</a>
        </p>
    </div>
</body>
</html>
